  "@types/react": "^19.2.14"
  react: "^19.2.6"
  react-dom: "^19.2.6"
  tsdown: "^0.22.0"
  vite: "^8.0.13"
  vitest: "^4.1.6"
  wrangler: "^4.94.0"

allowBuilds:
  es5-ext: true
  esbuild: true
  sharp: true
  workerd: true
