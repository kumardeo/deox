packages:
  - packages/*
  - __tests__
  - __tests__/*

allowBuilds:
  es5-ext: true
  esbuild: true
  sharp: true
  workerd: true

catalog:
  "@cloudflare/workers-types": "^4.20260515.1"
  "@types/node": "^25.8.0"
  "@types/react": "^19.2.14"
  react: "^19.2.6"
  react-dom: "^19.2.6"
  tsdown: "^0.22.0"
  vite: "^8.0.13"
  wrangler: "^4.91.0"

engineStrict: true
strictPeerDependencies: true
shellEmulator: true
preferWorkspacePackages: true
linkWorkspacePackages: true
enablePrePostScripts: true
